{{ define "main" }}

        <h1 class="p-name">{{ .Title }}</h1>
        {{ partial "search.html" . }}
    </section>
    <main class="h-entry e-content container col">
        {{ with .Content }}
            <div class="search-copy">{{ . }}</div>
        {{ end }}
        <div class="cards" id="results"></div>
    </main>
{{ end }}
