The Everything Journal</p></div><nav><ul></ul></nav><script>window.store={"http://localhost:1313/categories/":{title:"Categories",tags:[],content:"",url:"http://localhost:1313/categories/"},"http://localhost:1313/tags/faith/":{title:"Faith",tags:[],content:"",url:"http://localhost:1313/tags/faith/"},"http://localhost:1313/tags/gratitude/":{title:"Gratitude",tags:[],content:"",url:"http://localhost:1313/tags/gratitude/"},"http://localhost:1313/tags/life-lessons/":{title:"Life Lessons",tags:[],content:"",url:"http://localhost:1313/tags/life-lessons/"},"http://localhost:1313/categories/personal-growth/":{title:"Personal Growth",tags:[],content:"",url:"http://localhost:1313/categories/personal-growth/"},"http://localhost:1313/posts/":{title:"Posts",tags:[],content:"",url:"http://localhost:1313/posts/"},"http://localhost:1313/tags/":{title:"Tags",tags:[],content:"",url:"http://localhost:1313/tags/"},"http://localhost:1313/":{title:"The Everything Journal",tags:[],content:"",url:"http://localhost:1313/"},"http://localhost:1313/things-i-have-learned-so-far-being-23/":{title:"Things I Have Learned So Far Being 23",tags:["Gratitude","Faith","Life Lessons"],content:`Growing Up in a Different World Being a young adult in this time and age feels like having a lot more responsibilities with fewer rewards, at least from where I stand.
AI is rapidly changing the nature of work. The world is becoming more urbanized, and the planet seems to suffer every day. We could aim to work in big corporations, and yet inflation often eats away what is left of our wages.
A lot of the advice we were given growing up seems less straightforward than it once did. We are left trying to assess which lessons still work and which ones need to be adapted in a rapidly changing environment shaped by shifting social and economic realities.
The quality of our lives depends largely on the quality of our lifestyle, relationships, values, and environment. These are some of the lessons I have learned so far.
Disclaimer: These reflections are only my subjective opinions based on what I have personally experienced.
Old and Traditional Values Have Truths in Them What do I mean by this?
First off, I am not entirely traditional, nor do I believe everyone should live exactly the way I do. However, according to what I have observed, some of the values we may think of as &ldquo;old&rdquo; or &ldquo;traditional&rdquo; may have existed for a reason.
One example of this is in the area of purity.
I have failed in this aspect before, and to this day I am still repenting. Though I stumble at times, I strive not to repeat those mistakes by the help of His grace.
One traditional value I have reconsidered is sexual restraint. While it is often dismissed as outdated, I have personally learned that some boundaries exist not to restrict us, but to protect us.
It is ironic that we belong to one of the most informed generations in history, yet sexually transmitted infections remain especially common among young people. Public health data consistently shows that adolescents and young adults carry a disproportionately high burden of STI cases despite having access to more information than previous generations.
Saving Money Is Important With the unending rise of inflation and little sign of meaningful relief, financial discipline is more important now than ever.
Many young adults today face rising housing costs, increasing living expenses, and economic uncertainty while still being expected to achieve the same milestones previous generations pursued. Whether that expectation is realistic is another question entirely.
I think it is unfair.
Health, Peace, and Relationships Are Very Important We often take our bodies and health for granted. Especially now that many of us are pushed into increasingly sedentary lifestyles, it becomes more noticeable how little attention we sometimes give to our physical well-being.
Have an active lifestyle, and develop the patience and discipline to take care of your body.
Peace is equally important.
Many of us spend our days constantly stimulated, constantly scrolling, constantly worrying about what comes next. Yet some of the most meaningful moments in life happen when we slow down enough to be present.
Protecting your peace is not laziness. Sometimes it is wisdom.
Relationships require maintenance.
In the age of AI and chatbots, this is one of the easiest things to overlook.
Humans are messy, and it is hard to deny ourselves and actively place ourselves in situations where people may inconvenience us, especially in an age that often emphasizes self-love above all else.
Most people are naturally concerned with their own lives, but if you do have people who are important to you, being able to reciprocate their efforts to connect with you—or even initiating those efforts yourself—is necessary as you grow older.
You do not need a lot of friends, only a few quality ones.
If you can add to your circle, good. But focus more on maintaining the quality of your friendships and ensuring that the people around you are helping you become a better person.
Your Environment Matters People often underestimate the amount of influence they allow into their lives. They consume whatever is placed before them without always stopping to think critically about it first.
I sincerely hope that my readers are not taking everything I say at face value and will hold me accountable if necessary.
But environment matters more than people realize.
It can make your life easier or harder. It can fill you with hope or leave you in despair.
No matter which lifestyles, ideas, or influencers you follow, make sure they are leading you toward a life that is richer, healthier, and more meaningful.
The Seeds We Plant in Our Twenties I have learned that life is more fulfilling when we give more of ourselves. It is less exciting and ultimately less meaningful when I choose to self-love my way through everything all the time.
The quality of your life depends on the quality of your lifestyle, relationships, values, and environment.
And there is no sowing season better than our early twenties.
We may not immediately see the harvest of all the little seeds we plant today, but sooner or later they will come to fruition. And when they do, we will eat of their fruit, whether rotten or good.
Trusting God Through It All Do not worry too much, and trust the Lord with all your heart.
All we can do is trust, do our best, pray, and love.
For life is all about loving God above all else and loving others as you love yourself.
Sources Centers for Disease Control and Prevention (CDC). Adolescents and Young Adults. `,url:"http://localhost:1313/things-i-have-learned-so-far-being-23/"},"http://localhost:1313/things-i-have-learned-being-a-working-student/":{title:"Things I Have Learned Being a Working Student",tags:["Gratitude","Faith","Life Lessons"],content:`Being a working student taught me more than how to earn money. It taught me about responsibility, regret, relationships, exhaustion, resilience, and faith. Looking back now after graduating college just last May, there are many lessons I wish I had learned earlier.
I started working as a young professional when I stepped into senior high school. Being part of a middle-class family in the Philippine economy meant we had to work harder than the system seemed to reward people. It was during the pandemic, so the job I worked at was a work-from-home customer service representative position. I lasted only six months.
I enjoyed my salary and everything that came with it. At that age, I did not fully understand my responsibilities or how much of a privilege it was to be working and earning my own money. I was able to help pay our family&rsquo;s bills, contribute to my tuition, and fund some of my own projects.
After that, I worked another work-from-home job as an appointment setter for a B2B account. I did not do well. To be fair, I have never been particularly good at sales anyway.
Still, I managed to support myself throughout senior high school until I graduated.
When I entered college, I decided to take a break from working. My sister supported me financially, and at the time, my reasoning was simple: I wanted to focus on my studies.
Looking back, this is one of the decisions I struggle with the most.
Bills were difficult to pay, and I often felt ashamed knowing that I was relying on my sister, even though she volunteered to help. I was fortunate enough to become an academic scholar, which gave me a 50% discount on my tuition, but I still wanted to contribute.
When I stepped into my second year of college, I worked as a student assistant in my school&rsquo;s office.
Some of the bills were paid, and though I was grateful for the opportunity, the environment was exhausting for me. It simply was not a place where I felt I could thrive. After one year, I decided to quit.
Throughout my third year in college, I continued relying on my sister.
At the time, I did not realize how much this situation was affecting me emotionally. One of the things I regret most was having to depend on a family member who could very well have been struggling too.
My sister has her own story, her own burdens, and her own exhaustion.
Though things could have been handled better at times, I understand now that carrying another person&rsquo;s responsibilities is not always easy. That realization changed the way I think about independence.
Then things became even more difficult.
My laptop broke.
So there&rsquo;s that. Haha.
I remember feeling stuck. I could not continue being a burden anymore, and I knew I needed to find a way forward.
Thankfully, I have my boyfriend, who was and still is incredibly supportive. I am eternally grateful for him. He lent me his MacBook so I could continue applying for jobs.
For five months, I searched.
Five months of applications, waiting, hoping, and trying not to lose motivation.
Eventually, I landed my first work-from-home job since 2021.
I was so happy.
For the first time in a while, I felt like I could breathe again.
I was able to save money and eventually buy a new laptop with help from my boyfriend and my mom. Most importantly, I was finally able to pay my own bills again without relying entirely on someone else.
I even got to fund some experiences for myself.
Nothing extravagant, but enough to enjoy the feeling of having earned something through my own effort.
At that point, I was juggling night shifts and face-to-face classes in the morning.
It was hard.
Very hard.
I was constantly tired, and my body was definitely struggling. But mentally, I was prepared to face each day because I had bills to pay. Looking back, I think I was operating almost entirely in survival mode.
Not long after, I was laid off.
So once again, I had to find another job.
Thankfully, I eventually found work that was not as physically taxing as the previous one.
This is only a small glimpse into what my life looked like while studying and working my way through college. There are many details left out, but the experiences taught me lessons that I will probably carry for the rest of my life.
Never Take Opportunities for Granted One lesson I learned is to never take opportunities for granted.
If I had known that work-from-home jobs would become much more saturated four years later, I might have made different decisions. I often think about my first job and wonder what could have happened if I had stayed longer, continued improving my skills, and gained more experience while I was still young.
Maybe some things would have turned out differently.
Maybe not.
But that experience taught me that opportunities are often easier to lose than we realize.
Independence Matters, but So Does Gratitude Another lesson is the importance of being able to support yourself.
For a long time, I carried guilt about relying on other people financially. I never wanted to become someone else&rsquo;s burden.
At the same time, this journey also taught me gratitude.
My sister helped me.
My boyfriend helped me.
My mom helped me.
There were seasons in my life when I simply could not do everything on my own.
While I still believe in doing everything I can to stand on my own feet, I also learned to appreciate the people who carried me when I was unable to carry myself.
I learned that independence is important, but gratitude is equally important.
Learn to Manage Your Time and Protect Your Rest I also learned that time management is a skill that needs to be developed intentionally.
To be honest, it is still one of my greatest struggles.
There are days when I feel like I am falling behind and days when I feel like I have everything under control. Most of the time, it is somewhere in between.
What matters is continuing to improve little by little.
Another lesson I learned is knowing when to rest, when to continue, and when to quit.
Even though I sometimes wish I had stayed at my first job, I do not completely despair over that decision. I understand there are reasons why things happen, and every experience taught me something valuable.
What has been harder for me is learning how to rest.
If you spend enough time in survival mode, rest can start to feel unnatural.
You become so used to constantly thinking about responsibilities, deadlines, bills, and problems that slowing down feels uncomfortable.
For me, rest looked like writing, journaling, drinking coffee, reading, going on dates with my boyfriend, and having meaningful conversations.
For someone else, it may look completely different.
What I do know is that being able to pause in a busy world is a skill.
It does not happen overnight.
It does not happen automatically.
It is something we learn.
Relationships Matter More Than We Realize Perhaps one of the most important lessons I learned was about relationships.
Learning how to navigate painful emotions while juggling academics and work responsibilities is incredibly important.
Skills can be learned.
Tasks can be mastered.
But relationships require care.
What made me realize this is how exhaustion affects us.
When we are overwhelmed, stressed, and running on empty, we inevitably become irritable.
We become impatient.
We become frustrated.
But exhaustion is never a justification for how we treat the people closest to us.
That is a lesson I am still learning.
Faith Carried Me Through Beyond all these lessons, there is one thing I cannot leave out.
If you have been reading my blogs, you probably already know that I am a person of faith.
I genuinely believe I survived those years because God helped me.
There were too many moments when things should have fallen apart completely, and yet somehow I kept moving forward.
Ultimately, I give all of it to Him.
I got through some of my most exhausting nights and painful emotions because He never stopped caring for me.
I think He is the only One we can fully rely on without fear of disappointing Him or burdening Him.
Reading the Bible kept me accountable in ways that self-help videos and articles never could.
It forced me to examine my character, my attitude, my habits, and my heart.
It challenged me to become a better person, even during seasons when I was struggling just to get through the day.
As I finish writing this, I know these are only snippets of lessons that many people have probably already discussed and explored far better than I ever could.
Haha.
But I am grateful that I get to share them anyway.
I am still young.
I am still learning.
There may come a day when I look back on this blog and realize that some of my perspectives have changed.
Who knows?
Life is about growing and evolving in some way, after all.
For now, these are the lessons I carry with me.
Thank you for being here.
`,url:"http://localhost:1313/things-i-have-learned-being-a-working-student/"},"http://localhost:1313/tags/joy/":{title:"Joy",tags:[],content:"",url:"http://localhost:1313/tags/joy/"},"http://localhost:1313/categories/life/":{title:"Life",tags:[],content:"",url:"http://localhost:1313/categories/life/"},"http://localhost:1313/tags/peace/":{title:"Peace",tags:[],content:"",url:"http://localhost:1313/tags/peace/"},"http://localhost:1313/small-joys-i-almost-missed-this-week/":{title:"Small Joys I Almost Missed This Week",tags:["Peace","Joy","Gratitude"],content:`Small Joys I Almost Missed This Week
— collecting overlooked moments
The Almost-Missed Moments A smile from a close friend, the breeze during commuting, the warmth of the sun when it&rsquo;s almost dusk, and the soft pastel skies my heart and eyes can see.
There are all but moments of fleeting pleasures. I often take them for granted. I don&rsquo;t think they&rsquo;re appreciated as much as they should have been.
There are many more of these moments. In a lifetime, they just stack up unappreciated and ignored.
Why We Overlook Them We take things for granted almost all the time. Joys that we once prayed for have all become too familiar to us, and as the saying goes, “Familiarity breeds contempt.” We may not exactly be hating them, but we no longer hold them with the same tenderness we once did when they felt distant, almost out of reach.
They fade quietly into the background—folded into routine, softened by repetition—until they become nearly invisible.
Gathering the Small Joys A gentle way of noticing
Beyond this, let us remember that joy can be gathered, even in its smallest forms.
It doesn’t ask for a grand gesture. It lives in the noticing.
In the way light rests on a wall for a few seconds longer than usual.
In the familiar sound of footsteps returning home.
In the pause before the first sip of something warm.
To gather these moments is not to hold onto them tightly, but to acknowledge them as they pass. To let them be seen, even briefly, before they slip back into the ordinary.
Perhaps this is enough—to notice, and to quietly say, this mattered, even just a little.
Letting Them Matter An invitation to keep noticing, gently
Not as a task to complete, but as a soft leaning toward what is already here.
Let the small joys remain small. There is no need to make them significant or meaningful beyond what they already are. Let them exist without pressure—unpolished, unrecorded, sometimes even unnamed.
And still, let them matter.
Not because they change anything dramatically, but because they accompany you, quietly, in the background of your days.
You don’t have to catch them all.
Just a few is enough.
Moment of Pause Close your eyes for a minute.
Listen for the quietest sound around you—the hum, the distant movement, the almost-silence.
Let it be enough to notice.
`,url:"http://localhost:1313/small-joys-i-almost-missed-this-week/"},"http://localhost:1313/tags/nothingness/":{title:"Nothingness",tags:[],content:"",url:"http://localhost:1313/tags/nothingness/"},"http://localhost:1313/tags/stability/":{title:"Stability",tags:[],content:"",url:"http://localhost:1313/tags/stability/"},"http://localhost:1313/the-art-of-doing-nothing-for-a-while/":{title:"The Art of Doing Nothing for a While",tags:["Nothingness","Stability","Peace"],content:`Sitting without filling the silence
The Urge to Fill the Silence We have trained our minds to be busy. Our world surrounds us with applause when we hustle and grind, saying idle hands are for the weak and lazy. To have work to do is noble, especially if the motivation is to purposefully create a life you want with your own hands. Cautionary tales against idleness have their uses, undeniably.
However, there is a certain art that has been forgotten. It is the art of doing nothing.
When you walk into an empty room, what would be the first thing you do? Suppose you&rsquo;ll be looking around at first, wondering why the room is empty. If the light falls gently, if the space holds a certain calm, you might linger just long enough to notice it. The way the air feels. The quiet resting on the walls. And if the room is pretty enough, you could take time to appreciate it.
And how long does that last? Before you&rsquo;ve even been in that room for ten minutes, your phone will have already lingered there longer than you have.
Have you ever felt that? The need to fill every silence as if it&rsquo;s a monster we need escaping from. Somewhere along the way, we have treated stillness as a nuisance, as if silence would swallow us whole if we don&rsquo;t fill it long enough.
Let me offer you another perspective. What if that silence is not a void waiting to be filled? But to be entered into — embraced — not hurriedly but gently and without urgency.
Redefining &ldquo;Nothing&rdquo; Has there been a time when you wondered why everything looks a lot more colorless? No, it&rsquo;s not your imagination. It is a real thing, and you&rsquo;re not alone in experiencing it.
One likely factor is that we have lost the joy of seeing everything newly. Growing older often means moving faster. Everything begins to feel urgent, and we leave ourselves very little room to pause, to sit in stillness, to simply notice. There is little to no time to pause, reflect, be quiet, and be still. And we wonder why the world looks dull.
Perhaps it isn&rsquo;t because the world changed its colors. But could it be because we have lost the art of appreciating everything around us — especially in quiet moments — when instead of resting in them, we feel the need to fill every silence?
What if stillness — what we often call nothingness — isn&rsquo;t an empty space that needs filling, but a quiet container holding its own kind of joy? Not because the absence itself creates happiness, but because of what becomes possible within it. In that hush, without the constant rush or expectation of noise, there&rsquo;s room to notice, to feel, to simply be — without the pressure to answer every silence with sound.
A Soft Routine of Doing Nothing A gentle way to approach stillness
There is a quiet kind of rest that asks nothing of you — not even to be productive about resting. It doesn&rsquo;t need structure, or outcome, or a sense of improvement. Only a small pocket of time, held gently.
Begin by choosing a modest window — five minutes, maybe ten. Not long enough to feel like a commitment, just enough to notice something shifting at the edges.
Find a place where the light settles softly. A chair near a window, the corner of a bed, a spot on the floor where the air feels still. Let the space hold you without needing to adjust it too much.
Leave your phone behind. Let the absence of it feel noticeable at first — the quiet might feel unfamiliar, like entering a room that has been closed for a while.
Sit without arranging yourself into a posture. There is no correct way to be here. Hands can rest wherever they land. Eyes can close, or stay open, following the slow movement of light across a wall.
Thoughts will come, as they always do. Let them pass like figures walking by a window — seen, but not invited in. There is no need to organize them, or to make sense of their sequence.
You may notice small things instead — the faint hum of a distant appliance, the rhythm of your own breathing, the weight of your body meeting the surface beneath you. Let these details exist without naming them too quickly.
Time will loosen its edges here. When the moment feels complete — not finished, just quietly enough — stand up. No closing ritual, no reflection required. Just a simple return.
What Emerges in the Quiet Let it be a space without demand.
Notice the thoughts that arrive. No need to arrive with clarity already formed, or to leave with something neatly understood. Insight doesn&rsquo;t have to surface. Nothing here needs to be productive, useful, or worth measuring. You can come as you are — uncertain, distracted, half-present — and that is enough.
Some days will feel restless. Your thoughts may wander in loose circles, or resist settling at all. There may be an urge to get up, to check something, to fill the quiet with noise. This, too, belongs. Restlessness is not a failure of the moment; it is part of the texture of being here.
Just come back when you can.
Letting It Be Enough The value is not in achieving stillness, but in returning to it — again and again, in small, quiet ways. A breath noticed. A pause between movements. A brief softening of attention. These are not milestones, just gentle re-orientations.
Stillness is not something to master or hold onto. It is something you visit. Sometimes briefly, sometimes without noticing when you&rsquo;ve arrived or left. There is no need to make it permanent.
Sit where you are. Let your hands rest without adjusting them. Notice one thing you can hear, one thing you can feel, and one thing you can see. Stay there for a minute — without naming it, without holding it.
If you’d like to return to moments like this more often,
I’ve put together a quiet little ebook for my newsletter.
Nothing structured, nothing to keep up with—
just a gentle companion for slower days.
You can find it here.
`,url:"http://localhost:1313/the-art-of-doing-nothing-for-a-while/"},"http://localhost:1313/tags/novelty/":{title:"Novelty",tags:[],content:"",url:"http://localhost:1313/tags/novelty/"},"http://localhost:1313/the-psychology-of-ordinary-comfort/":{title:"The Psychology of Ordinary Comfort",tags:["Stability","Novelty"],content:`Gentle Entry Into the Ordinary Going to school meant doing mundane things: wearing the same old uniforms that I&rsquo;ve used for years, waking up at the same time (inconsistently, however) whenever the alarm clock rings, and undergoing the same old routine I&rsquo;m used to.
Whenever these things happened, I mostly just cruised through on autopilot, not minding each step as long as I could get to the next. After all, the main goal was to go to school.
It wasn&rsquo;t until life disrupted my schedule and routine that I realized I longed for the comfort of the mundanity of the rituals I did every morning.
Waking up, turning my alarm off, bathing, eating, and brushing were all things I did during those days. This routine I had, I mostly took for granted. When life forces you to shift from the repetition of your habits, you may feel the pressure—and only then do you appreciate it. Indeed, it can be growth. However, there is a certain comfort and stability that allow you to rest when things are predictable.
It is not bad to undergo periods of change in life that leave us pressured and force us to adjust, whether drastically or minimally. Humans are made to evolve, and sometimes that looks like change and novelty.
The Brain’s Love Language Is Predictability But humans are also made for comfort. Pressure changes us, and it can—and should—always be for the better, but prolonged periods under stress are never healthy. We cannot grow under constant tension; we need recovery.
Rest allows humans to adapt with resilience and is crucial for emotional regulation. This is why meditation and self-care routines are rising in response to the hustle-and-grind culture. Predictable rest allows adaptability and stability without inhibiting innovation and learning.
With how unpredictable the world is becoming, choosing predictability is not regression. It is regulation.
Why Repetition Feels Like Safety (Not Boredom) Habits have always been a topic among scholars and ordinary people alike. According to what we are taught, growth comes from constant change.
Being ambitious and always seeking the next milestone is good, but you can only handle so much change. You need to allow your body and mind to take a step back and cherish what you have been through, learning the lessons along the way—whether the milestone you&rsquo;ve achieved is small or big.
Otherwise, you&rsquo;re just a hypervigilant machine, gathering more and more experiences without actually experiencing them fully, missing the lessons they were made to teach.
Repetition has always been seen as mundane, boring, ordinary—almost unworthy for those chasing greatness. Overreliance on habits can lead to rigidity, especially when breaking them feels threatening.
But that&rsquo;s not what I want to focus on today.
The truth is, we can never fully grow and achieve the greatness we want until we allow ourselves to feel pressure and simultaneously embrace the comfort of familiarity and rest. Pressure and pause, together, allow adaptability, innovation, sustained creativity, and emotional maturity.
Comfort Is Not Laziness: A Cultural Rebuttal Productivity culture frames comfort and predictability as weakness. Yet, research shows that predictability—whether in routine or schedule—actually enhances our capacity to handle growth. When routines become comfort zones, they allow us to return, rest, meditate, and reflect on what we’ve learned.
Rest is not a sign that growth doesn’t matter; on the contrary, it is essential. Recovery during ordinary, mundane acts may actually help us become more grounded, stable, and emotionally regulated.
There is a difference between escaping into predictability and leaning into ordinary routines for recovery without compromising growth.
That could look like journaling, meditating on lessons learned, taking care of your body, or regulating emotionally. Taking a pause ensures you are actually experiencing life, rather than operating on autopilot.
When we embrace these moments, creativity follows. Each person can generate unique meaning from their hardships, regardless of how common they might be. Learning to rest in these crucial times allows space for individuality, perspective, and the value one can offer. Humans naturally value what they can contribute—it gives a sense of impact and purpose, proving that all experiences are not for nothing.
The Quiet Power of the Ordinary Ever since my schedule and life routine were disrupted, I have longed for those simple routines I had before. They allowed me to be calm and plan my day. Afterwards, I would reflect on what I experienced.
It is harder now, but I never lost hope. Recovery can be recreated intentionally. Growth and rest can coexist, and it may look different for everyone. It can be as simple as journaling, praying, or sipping your favorite drink.
In a world of increasing unpredictability, choosing familiarity and rest is a quiet, radical act of self-care—and, in fact, growth.
`,url:"http://localhost:1313/the-psychology-of-ordinary-comfort/"},"http://localhost:1313/tags/hope/":{title:"Hope",tags:[],content:"",url:"http://localhost:1313/tags/hope/"},"http://localhost:1313/living-in-the-present-and-looking-to-the-future/":{title:"Living in the Present and Looking to the Future",tags:["Gratitude","Joy","Hope"],content:`Living in the Present and Looking to the Future: Gratitude and Hope In my most recent blog, I talked about gratitude and joy and how these two correlate with each other. The importance of choosing to be grateful can be seen in the resulting joy it entails. One sip of coffee with gratitude can greatly align our perspectives and uplift our moods even when things in our life turn sour.
Reminders like this greatly benefit us who are most prone to being forgetful. Being able to be grateful even when things are painful is not a discipline that is easy to incorporate - it has to be wrought by grace. Adopting this mindset also increases the risk of toxic positivity in us if we do it by ourselves, which will be damaging for us in the long run.
My purpose in writing this is not to share a mindset that celebrates masochism and pain in an unhealthy way. No, that is not what I want for me nor for you. I hope to inspire other people that even if life will not turn out for the better as we hope because sometimes it just gets worse, we would be grounded enough to not base our happiness on circumstances, people, nor on things which can all lead to disappointments - but to rest our hope on hope.
Hoping Against Hope How can you hope when things are so dark and despairing, that so much of it would make you hopeless?
In times of painful despair, there is nothing more paralyzing than hoping. When children and loved ones die, dreams crushed, and reality seems to remind you of the absences of the things lost or not given to us, it is painful to bear the longings of the dashed pieces in our lives. When people betray us, and dreams have not yet matured - or never will be - though we longed or waited for years long, it can be crushing for us when these hopes are not given or denied, and yet to tell ourselves to continue hoping.
Come to think of it, without hope, we lessen the risk of despair. How many of us have said to ourselves, &ldquo;If only I didn&rsquo;t trust so much, I wouldn&rsquo;t have been betrayed,&rdquo; or &ldquo;If only I hadn&rsquo;t kept my hopes up, I would not have been disappointed.&rdquo;
Both of these scenarios can be linked to hoping - we trusted because we hoped they were trustworthy, we expected things because we hoped our dreams would soon be realized.
So what do I mean about hoping on hope?
In Mere Christianity, Lewis writes:
Hope is one of the Theological virtues. This means that a continual looking forward to the eternal world is not (as some modern people think) a form of escapism or wishful thinking, but one of the things a Christian is meant to do.
Hope in the Christian life is not something we give to ourselves, nor of someone else. It is given by God Himself, not in a wishy-washy way where we&rsquo;d hear His voice, but through His means of grace in our lives. It has been long said that hope is &ldquo;a desire or feeling&rdquo;, but in biblical terms not only is it a feeling of confident expectation, rather, it is also an action.
John Piper also has some words in this article about hope:
If I am put down, I look to the emotional reservoir of hope for the strength to return good for evil. Without hope, I have no power to absorb the wrong and walk in love, and I sink into self-pity or self-justification.
If I experience a setback in my planning — I get sick, or things don’t go the way I’d hoped in the board meeting, for example — I look to the emotional reservoir of hope for the strength to keep going and not give up.
If I face a temptation to be dishonest, to steal, to lie, or to lust, I look to the emotional reservoir of hope for the strength to hold fast to the way of righteousness, and deny myself some brief, unsatisfying pleasure.
Hoping is akin to looking, not to our circumstances but to God who is the Giver of Hope, especially to His promise.
Gratitude and Hope What does hope have to do with gratitude? I have implied that hoping is akin to looking, well, gratitude can be a good place to start.
Hope looks to the future, and gratitude contents itself in the present.
When storms in life arise and there is nothing to hold onto and when all we can see are loss and despair, gratitude creates a window of relief: a sigh, a breath of fresh air and with it a steady ground for the soil - hope - where we could plant our seeds anew, and to trust that whatever may happen in the future we would be able to find joy in the midst of chaos by looking not to our circumstances but to God and His promises.
We ground ourselves steady in His time-tested words, and hold Him to His word as we trust that He will accomplish what He has started in us, through us, for His glory and our good.
Gratitude creates in us an attitude of looking to things given rather than things denied or lost. It helps us appreciate what we have now, and enables us to look forward. While hope may seem painful sometimes, and not hoping for anything may act as a shield from pain and disappointments, the life you&rsquo;ll be living is a life left un-lived. But we don&rsquo;t need to shy away from the pain and risk of disappointments, we have been given grace, strength, and tools to enable us to hope even in this world of suffering and sin.
While hope is entirely another topic I probably should write about, we shall stick with gratitude for now, and I hope to be given time and wisdom to be able to write about it in the future.
Gratitude is a discipline, a skill that must be daily practiced and must not be relied on feelings - for we know how fickle we are as humans.
`,url:"http://localhost:1313/living-in-the-present-and-looking-to-the-future/"},"http://localhost:1313/gratitude-and-joy/":{title:"Gratitude and Joy",tags:["Gratitude","Joy","Mindfulness"],content:`Gratitude - Why It&rsquo;s Important to Choose Joy &ldquo;I&rsquo;m tired.&rdquo;
&ldquo;I just want this done.&rdquo;
&ldquo;Why does this keep on happening to me?&rdquo;
All of us have said these lines once or twice—or even multiple times a day. We are not immune to the loads of tasks that we might tackle under short notice. Oftentimes, we find it hard to have peace when small inconveniences happen. Things don&rsquo;t go as we planned, work continues to pile up, quizzes and school assignments seem never-ending.
On top of that, we have burdens that need catering to and are unfinished whether emotionally or mentally. We face these challenges almost always simultaneously, and all of a sudden, we find ourselves complaining. But ask yourself, has it always been helpful? Does it not rob us of peace and the strength for a task that has not even started?
&ldquo;Why is it so hard?&rdquo;
&ldquo;Why does it have to be me?&rdquo;
&ldquo;This again?&rdquo;
&ldquo;This is unfair.&rdquo;
or even deeper, something like this:
&ldquo;Why am I like this?&rdquo;
It is not wrong to strive to excel in everything. I mean, we often complain because we see that our goals are not aligned with our reality—we find it frustrating when things don&rsquo;t behave the way they must. And I am not talking about unplanned inconveniences alone, but also the frustrations that we have in ourselves.
Think back—how often have you caught yourself complaining?
In a fast-paced world where everything has to be instantaneous, we can get short-sighted by our limitations as we fall into two things: underestimating or overestimating ourselves.
When a schoolwork comes up and it is not something we have done previously, it is easy to run ahead of ourselves and say our frustrations just because we feel intimidated by the newness of the challenge. We are not used to challenging ourselves and our existing beliefs, systems, or routines, that we find it easier to complain first before getting to embracing the challenges presented before us.
By doing this, we underestimate ourselves. We sell ourselves short and we look not beyond to what we could accomplish or what could serve to glorify God and uplift others. We don&rsquo;t like to be inconvenienced, and we limit ourselves to stay in what is comfortable at the cost of our growth. We choose what is easy and comfortable even if it meant stagnation.
I am not saying that it is wrong to feel tired or sigh a little bit when we get new work or jobs to do. I am referring to the kind of complaints that is usually a default mode in us. We haven&rsquo;t even tackled the project yet, but it already seemed insurmountable. I am not immune to this—I am this too.
When Complaints Become a Cycle Now, there are instances where we accept more jobs than we can handle. We never know where our limitations lie, and when we make work that does not produce the qualities we intended, we get frustrated—and we complain. Again.
Again, it is never wrong to complain about outputs that don&rsquo;t pass our standards. The desire to produce the highest quality within our capacities is built into all of us. But it is also never wrong to be honest with ourselves and say that, &ldquo;This is something that is beyond my capacity.&rdquo;
I am not referring to the kinds of complaints that have persevered under duress and hard circumstances. There are times that there is nothing we can do but to cry out, and it is a very valid and human response. That is not what I am talking about here.
It is not wrong to feel tired, but it is not right to view things in a complaint mode consistently.
When hard times come, it is easier to focus on the trial and complain.
But what if I tell you there is another way to respond?
My Turning Point There was a time when I was, as I could say, hard-pressed against all sides. Relationally, I was not doing good. Various conflicts arose, and the challenges in my relationships were really bad. I found it frustrating back then that alongside these relational problems (in almost all aspects of my life), I had troubles with my studies and work. Spiritually, I wasn&rsquo;t doing good either.
Looking back, it really was just a hard place—a wasteland. It&rsquo;s not even the wilderness, but a place where hopes got crushed, and strengths got pushed farther than they were able. And when I tried to look at my circumstances, I had nothing to see but darkness and brokenness all over.
I praise God for giving me grace. I believe that He really met me where I was at that time. If it wasn&rsquo;t for Him, I&rsquo;d never know where I&rsquo;d be. I probably would not have made it to the other side.
So what I did was, since I felt that I had no other choice but to sigh, complain—a LOT—cry out and say that this was a place I never wanted to be nor would I ever want to stay in any longer.
My health was failing, my relationships deteriorating, and on top of that, I had to show up to school and work bringing in the best of my capabilities to sustain the qualities they asked of me.
My cries also sometimes felt that they were not heard. It was a situation where complaining was by far the easiest thing to do. So I did it at every chance I got.
It also, however, made me stuck in that place longer than it would have been had I allowed myself to be humbled by His grace and accept everything with a grateful and submissive heart.
So there I was, still complaining why I was the way I was, and also complaining about my circumstances. I knew it wasn&rsquo;t working—it was just easier.
I got to a point where I couldn&rsquo;t see any hope or future that I wanted as long as I stayed in that mode. This is what I meant when I said that if it was not for His grace, I would be far worse today.
One night, I took a long, hard look at myself and saw that I was not only hurting my relationship with the Lord but also those whom I had promised to protect and love. I knew that by going in this direction, it would give way to a path where I would forever regret. It was a glimpse of what my life would be as I pictured it, that would come as a result of the path I was walking on. Until now, I couldn&rsquo;t erase that image. I hated the picture.
Something inside me snapped. I repented and asked for forgiveness, and by that, I finally got more careful.
A New Perspective Along the way, I still found it difficult to cope with my situations since they still were not the way I wanted. Complaining was still one of the main things I did, but I also knew it would pave the way to the path I dreaded.
I had no choice, but by grace, I felt forced to look at things gratefully. My eyes were finally opened by grace to view the world with childlike wonder. Heck, even sunlight makes me giggle with joy now. I practiced gratitude daily then. I noticed that though it never changed my situations, I was more attuned to my walk, joy in my relationship with Christ (the most important thing for me), and I was enabled—by grace, because all is grace (grasya lang gid tanan! IYKYK)—to view things, no matter how small, with gratefulness and joy.
It still came as a challenge for me, since sometimes the situations got worse, but now I have learned that joy and gratitude are both choices I can make no matter how bad things get.
The good in my life was Christ. I will forever be foremostly grateful for His salvation and my relationship with Him. He chose me when I would never have chosen myself.
Practicing gratitude was a real life-changer. It was the means that God used to make me enjoy the things He has bought at the cost of His blood. It made me less entitled, and more focused on the now than what or how I&rsquo;ve wanted things to be. Gratitude brought about by grace is something that I realized, not a small thing. Instead of looking to the missing things, gratitude turns our attention to what has already been given to us. It trusts that in the face of hardships, God is working something behind the mess.
Gratitude and joy go hand-in-hand. If you can find things to be grateful for in everything no matter where you are in life, it&rsquo;s easier to focus more on garnering joy even in the presence of pain. &ldquo;Joy and pain can coexist,&rdquo; indeed. Joy is never the absence of pain, it is what helps us get through it. Christians can have a joy that can be made even in the midst of chaos.
Christ has made this all possible for me—and you.
Joy Is a Choice That is why I always want to encourage people to learn this skill, because truthfully, I don&rsquo;t want anyone to learn the hard way as I did—just because I chose to complain instead of looking to the good.
I would like to exhort you, my dearest brethren: gratitude plays an important key in our witnessing to the world.
Will you choose joy today, or will you choose to stay in the cycle of complaints?
`,url:"http://localhost:1313/gratitude-and-joy/"},"http://localhost:1313/tags/mindfulness/":{title:"Mindfulness",tags:[],content:"",url:"http://localhost:1313/tags/mindfulness/"},"http://localhost:1313/it-has-been-morning/":{title:"It Has Been Morning",tags:["Life"],content:`Dawn wakes us up in ways that are different. I wonder what kind of dawn awaits me tomorrow. Will I face new waves of darkness, rain, and the pitter-patter of its drops letting me know of its existence? Or will I be awakened to the warmth of the lovely Yellow Face, inanimate as she is?
Sometimes, I look for hope when there has been none. It&rsquo;s hard to see it if I am surrounded by clouds of darkness and despair. But hope in itself irrigates the land we&rsquo;re upon. Like roots beneath the soil, it works quietly, unseen, steady. It matters not how many fogs there are about, as long as the ground is steady. It may, for a while, blind us, but we can always keep walking – yes, walk - but with purpose.
Even if it&rsquo;s unclear, as long as you&rsquo;re moving, you&rsquo;re living. Life goes on, and we aren&rsquo;t the better for it if we remain stuck in the clouds.
Who knows whether we&rsquo;ll gain an entrance to the paths of the sun?
We shall try and try again.
`,url:"http://localhost:1313/it-has-been-morning/"},"http://localhost:1313/tags/life/":{title:"Life",tags:[],content:"",url:"http://localhost:1313/tags/life/"},"http://localhost:1313/tags/author/":{title:"Author",tags:[],content:"",url:"http://localhost:1313/tags/author/"},"http://localhost:1313/me-whys/":{title:"Me & Whys",tags:["Life","Author"],content:`&ldquo;She&rsquo;s beautiful,&rdquo; she muttered as she looked at the girl on tv walked down the aisle during the pageant. The pregnant woman watching the tv stared in awe as she favored the girl whom she&rsquo;s watching right now.
&ldquo;I wonder what&rsquo;s her name,&rdquo; the candidate moved forward and stepped onto the platform to formally introduce herself. She was beautiful and her smile lit up her pretty face as her eyes gleamed a confident glow.
&ldquo;Good evening, I am Allysa Kaye,&rdquo; the pregnant woman adored her name as much as she adored her beauty.
&ldquo;Now I know what to name her.&rdquo;
And on a sunny morning, a beautiful infant came into the world.
&ldquo;Her name is Allysa Khae.&rdquo;
And that&rsquo;s how I got my name in this life.
My Name is Allysa, and I Started a Blog Honestly, I have no idea how I ended up here. Writing has always been something I wanted to do, but I never really knew how to start. Then I thought—I&rsquo;m an IT student, so why not practice building static websites while setting up a blog? Before I knew it, I had a fully deployed site, all for free. It’s crazy how true it is that we can accomplish whatever we put our minds to. [That is, God-willing.]
Now that I&rsquo;m here, though, I’m not exactly sure where to begin. At first, this blog was just supposed to be a portfolio, something to impress future clients while I hopped from one job to another. But somewhere along the way, I realized—portfolio or not—I’m sticking with this. I’m going to make the best of it.
I blog to express myself, to put something positive, valuable, and authentic into the world. I want this space to be as real as possible—unfiltered, unapologetic, and entirely me.
Welcome to my first article! It won’t be my last. `,url:"http://localhost:1313/me-whys/"},"http://localhost:1313/categories/prose/":{title:"Prose",tags:[],content:"",url:"http://localhost:1313/categories/prose/"},"http://localhost:1313/tags/short-prose/":{title:"Short Prose",tags:[],content:"",url:"http://localhost:1313/tags/short-prose/"},"http://localhost:1313/stability-novelty/":{title:"Stability & Novelty",tags:["Stability","Novelty"],content:`9:09 PM
People are different and built in their own ways. We have different tastes, outlooks, and opinions on how we want our life. Unfortunately for me, I crave stability over novelty.
I love it when things take their time to grow, I love seeing growth over a long period of time, and even after decadence and failures, and I love it when patience is patient in each of us – what I meant is how patience teaches us to be patient with ourselves, others, and the things or the outcomes in our lives.
There is a special grace in the middle – the mundane, the zero, the grey – a time when flowers didn&rsquo;t bloom when expected, but you kept watering consistently, enduringly, and patiently.
Some things are made to endure by enduring; some of which cannot be achieved without consistent repetition. Character takes time. Love takes time. I think almost all the most beautiful things we want in life must take time. Does this mean those who crave novelty are lesser in their ideals?
No.
For novelty is the desire to innovate what was, a taste for maybe something better, for even stability must not be stable if it worsens. Stability is thus improved and bettered upon, when novelty is used for good without compromising the core truths and stability&rsquo;s non-negotiable 𝘷𝘦𝘳𝘶𝘮 𝘷𝘦𝘳𝘪𝘵𝘢𝘴.
As a growing young adult, I lean more on the spectrum towards that which is stable. I believe that while we are meant to progress, we are also meant to endure, stabilized enough that we would not be swayed by every new thing, doctrine, or ideals. Humans are complex, life is very nuanced. It&rsquo;s so interesting to live. I praise God.
`,url:"http://localhost:1313/stability-novelty/"},"http://localhost:1313/the-one-place/":{title:"The One Place",tags:["Short Prose"],content:`Small thoughts for fleeting times
One can long for peace and quiet. Dream of being drifted away, somewhere far where no one can see me. Drinking a cup of coffee inside a warm, cozy, little house, content to ignore and be ignored. It is a dream of mine, howbeit, as long as we are in this world, darkness will follow. Sorrows will come, and shadows of doubts will often visit.
But there is one place. A place of peace and quiet, where you can remain as you are — loved and accepted.
